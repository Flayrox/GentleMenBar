<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Affiche par défaut du match">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B2516"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#f1d57a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="180" fill="#D4AF37" fill-opacity="0.08"/>
  <circle cx="140" cy="560" r="220" fill="#D4AF37" fill-opacity="0.08"/>
  <rect x="90" y="90" width="1020" height="495" rx="32" fill="#121212" fill-opacity="0.88" stroke="#D4AF37" stroke-opacity="0.3"/>
  <text x="150" y="220" fill="#f7f3e8" font-family="Arial, sans-serif" font-size="54" font-weight="700">Le Gentleman Pub</text>
  <text x="150" y="295" fill="#D4AF37" font-family="Arial, sans-serif" font-size="34" font-weight="700">Affiche du match bientôt disponible</text>
  <text x="150" y="365" fill="#d1d5db" font-family="Arial, sans-serif" font-size="26">Saint-Michel, Paris 5e</text>
  <rect x="150" y="430" width="280" height="56" rx="28" fill="url(#gold)"/>
  <text x="190" y="468" fill="#121212" font-family="Arial, sans-serif" font-size="24" font-weight="700">Match à venir</text>
</svg>